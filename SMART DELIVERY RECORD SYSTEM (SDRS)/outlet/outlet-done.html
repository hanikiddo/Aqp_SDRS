<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Completed | Outlet</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-shadow { box-shadow: 0 18px 45px rgba(15, 35, 65, 0.12); }
    body { background: linear-gradient(180deg, #FEF3C7 0%, #F8FAFC 100%); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F2341',
            amber: '#F59E0B',
            amberSoft: '#FEF3C7',
            corporate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-800">
  <main class="w-full max-w-xl bg-white rounded-[2rem] border border-slate-200 card-shadow p-8 sm:p-10">
    <div class="flex flex-col items-center text-center gap-6">
      <div class="flex h-24 w-24 items-center justify-center rounded-full bg-emerald-100 text-emerald-700 shadow-sm">
        <i data-lucide="check-circle" class="w-14 h-14"></i>
      </div>
      <div>
        <h1 class="text-3xl font-extrabold text-navy">Order Completed Successfully!</h1>
        <p class="mt-3 text-sm text-slate-500">Delivery verification has been completed.</p>
      </div>
      <div class="w-full rounded-3xl border border-amber-100 bg-amber-50 p-6 text-left shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-amber-600 font-bold mb-2">Order Summary</p>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Outlet ID</p>
            <p id="outletId" class="text-lg font-bold text-navy">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Outlet Name</p>
            <p id="outletName" class="text-lg font-bold text-navy">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Delivery Date</p>
            <p id="deliveryDate" class="text-lg font-bold text-navy">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Status</p>
            <span class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold uppercase tracking-wide text-emerald-700">COMPLETED</span>
          </div>
        </div>
      </div>
      <div id="communicationPanel" class="space-y-4"></div>
      <div class="w-full rounded-3xl border border-slate-200 bg-white p-6 text-left shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-slate-600 font-bold mb-4">Verified XFER Items</p>
        <div id="itemsList" class="space-y-3"></div>
      </div>
      <div class="grid w-full gap-3 sm:grid-cols-2">
        <a href="index.html" class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-navy px-6 py-4 text-sm font-bold text-white shadow-lg shadow-navy/10 transition hover:bg-[#0c1c34]">
          <i data-lucide="chevrons-left" class="w-4 h-4"></i>
          Back to Outlet List
        </a>
        <a href="../index.html" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-6 py-4 text-sm font-bold text-navy transition hover:bg-slate-50">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          Main Dashboard
        </a>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    function formatTimestamp(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Unknown time';
      return date.toLocaleString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    function formatTimeLabel(timestamp) {
      if (!timestamp) return '--';
      return new Date(timestamp).toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getLatestOrderCommunication(orderId) {
      const complaints = JSON.parse(localStorage.getItem('sdrs_complaints') || '[]');
      return complaints
        .filter(c => String(c.orderId) === String(orderId))
        .sort((a, b) => b.time - a.time)[0] || null;
    }

    function parseArrayFromStorage(key) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || '[]');
        return Array.isArray(value) ? value : [];
      } catch (err) {
        return [];
      }
    }

    function getOrderItems(order) {
      return [
        order.receivedItems,
        order.items,
        order.xfers,
        order.xferItems,
        order.selectedItems,
        order.transferItems,
        order.payload
      ].find(items => Array.isArray(items) && items.length) || [];
    }

    function getOrderMatchKeys(order) {
      return [
        order.id,
        order.transferId,
        order.orderId,
        order.outletTransferId,
        order.routeLabel,
        order.displayTransferId
      ].map(value => String(value || '').trim()).filter(Boolean);
    }

    function findCompletedOrder(transferId) {
      const target = String(transferId || '').trim();
      const storageKeys = [
        'adminGlobalPipeline',
        'outletIncomingQueue',
        'outletCompletedDeliveries',
        'driverHistory',
        'warehouseTransfers',
        'deliveryRecords',
        'sdrs_records',
        'sdrs_main_orders',
        'sdrs_orders',
        'orders',
        'outletHistory',
        'sdrs_outlet_history',
        'outlet_incoming',
        'driver_history',
        'warehouse_xfer_data'
      ];

      let orders = [];
      storageKeys.forEach(key => {
        orders = orders.concat(parseArrayFromStorage(key));
      });

      try {
        const lastCompleted = JSON.parse(localStorage.getItem('sdrs_last_completed_order') || 'null');
        if (lastCompleted && typeof lastCompleted === 'object') orders.push(lastCompleted);
      } catch (err) {}

      const matches = orders.filter(order => order && typeof order === 'object' && getOrderMatchKeys(order).includes(target));
      if (!matches.length) return null;

      return matches.find(order => String(order.status || '').toUpperCase() === 'COMPLETED' && getOrderItems(order).length)
        || matches.find(order => String(order.status || '').toUpperCase() === 'COMPLETED')
        || matches.find(order => getOrderItems(order).length)
        || matches[0];
    }

    function getOutletId(order) {
      return order.destinationOutletId || order.outletId || order.outlet || order.destination || order.id || 'Unknown';
    }

    function getOutletName(order) {
      return order.destinationOutletName || order.outletName || order.destination || order.outlet || 'Unknown Outlet';
    }

    function getDeliveryDate(order) {
      return order.completedAt || order.receivedAt || order.updatedAt || order.createdAt || order.dispatchDate;
    }

    function renderCommunicationPanel(order) {
      const container = document.getElementById('communicationPanel');
      if (!order?.id) {
        container.innerHTML = '';
        return;
      }
      const communication = getLatestOrderCommunication(order.id);
      if (!communication) {
        container.innerHTML = '';
        return;
      }
      const remarkSection = `
        <div class="rounded-3xl border border-orange-200 bg-orange-50 p-5">
          <div class="text-[10px] uppercase tracking-[0.35em] font-bold text-orange-700 mb-2">Outlet Remarks</div>
          <p class="text-sm text-slate-900 font-semibold">${communication.remark}</p>
          <div class="mt-3 text-[11px] font-medium text-orange-700">${communication.xfer ? `${communication.xfer} • ` : ''}${formatTimeLabel(communication.time)}</div>
        </div>
      `;
      const replySection = communication.response ? `
        <div class="rounded-3xl border border-slate-200 bg-slate-50 p-5">
          <div class="text-[10px] uppercase tracking-[0.35em] font-bold text-slate-700 mb-2">Admin Reply</div>
          <p class="text-sm text-slate-900 font-semibold">${communication.response}</p>
          <div class="mt-3 text-[11px] font-medium text-slate-500">By ${communication.responseBy || 'Admin'} • ${formatTimeLabel(communication.responseTime)}</div>
        </div>
      ` : '';
      container.innerHTML = remarkSection + replySection;
    }

    let displayedOrder = null;

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const transferId = urlParams.get('id');
      if (!transferId) {
        document.getElementById('outletId').textContent = 'No ID provided';
        document.getElementById('outletName').textContent = 'Please return to outlet list';
        document.getElementById('deliveryDate').textContent = '--';
        return;
      }

      const order = findCompletedOrder(transferId);

      if (!order) {
        document.getElementById('outletId').textContent = 'Order not found';
        document.getElementById('outletName').textContent = 'Please check order ID';
        document.getElementById('deliveryDate').textContent = '--';
        return;
      }

      displayedOrder = order;
      document.getElementById('outletId').textContent = getOutletId(order);
      document.getElementById('outletName').textContent = getOutletName(order);
      document.getElementById('deliveryDate').textContent = formatTimestamp(getDeliveryDate(order));

      renderCommunicationPanel(order);

      const itemsList = document.getElementById('itemsList');
      itemsList.innerHTML = '';
      getOrderItems(order).forEach(item => {
        const itemCard = document.createElement('div');
        itemCard.className = 'rounded-2xl bg-slate-50 border border-slate-200 p-4';
        const itemName = item.name || item.xferNumber || item.xferNo || item.sku || 'Item';
        const receivedQty = item.receivedQty || item.qty || item.totalBoxes || item.boxes || 0;
        const expectedQty = item.expectedQty || item.qty || item.totalBoxes || item.boxes || 0;
        itemCard.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <p class="font-bold text-slate-900">${itemName}</p>
            <span class="text-xs uppercase tracking-wide text-slate-500">${receivedQty}/${expectedQty} boxes</span>
          </div>
          ${item.remark ? `<p class="mt-2 text-sm text-orange-700">Remark: ${item.remark}</p>` : ''}
        `;
        itemsList.appendChild(itemCard);
      });
    });

    window.addEventListener('storage', (e) => {
      if ((e.key === 'sdrs_complaints' || e.key === null) && displayedOrder) {
        renderCommunicationPanel(displayedOrder);
      }
    });
  </script>
</body>
</html>
