<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Submitted | Outlet Sender</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-shadow { box-shadow: 0 18px 45px rgba(15, 35, 65, 0.12); }
    body { background: linear-gradient(180deg, #E0F2FE 0%, #F8FAFC 100%); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F2341',
            teal: '#2BA5B5',
            corporate: {
              50: '#f8fafc',
              100: '#f1f5f9'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-800">
  <main class="w-full max-w-2xl bg-white rounded-[2rem] border border-slate-200 card-shadow p-8 sm:p-10">
    <div class="flex flex-col items-center text-center gap-6">
      <div class="flex h-24 w-24 items-center justify-center rounded-full bg-emerald-100 text-emerald-700 shadow-sm">
        <i data-lucide="check-circle" class="w-14 h-14"></i>
      </div>

      <div>
        <h1 class="text-3xl font-extrabold text-navy">Transfer Request Submitted!</h1>
        <p class="mt-3 text-sm text-slate-500">Your outlet transfer request has been saved for admin review.</p>
      </div>

      <div class="w-full rounded-3xl border border-sky-100 bg-sky-50 p-6 text-left shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-sky-600 font-bold mb-4">Transfer Summary</p>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">From Outlet</p>
            <p id="fromOutlet" class="text-base font-bold text-navy break-words">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">To Outlet / Warehouse</p>
            <p id="toDestination" class="text-base font-bold text-navy break-words">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">XFER / Item Name</p>
            <p id="itemName" class="text-base font-bold text-navy break-words">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Total Boxes</p>
            <p id="totalBoxes" class="text-base font-bold text-navy">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4 sm:col-span-2">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Status</p>
            <p id="status" class="text-base font-extrabold text-amber-700 break-words">OUTLET_TRANSFER_PENDING</p>
          </div>
        </div>
      </div>

      <div class="grid w-full gap-3 sm:grid-cols-2">
        <a href="index.html" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-navy px-6 py-4 text-sm font-bold text-white shadow-lg shadow-navy/10 transition hover:bg-[#0c1c34]">
          <i data-lucide="chevrons-left" class="w-4 h-4"></i>
          Back to Outlet Sender
        </a>
        <a href="../index.html" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white px-6 py-4 text-sm font-bold text-navy transition hover:bg-slate-50">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          Main Dashboard
        </a>
      </div>
    </div>
  </main>

  <script>
    function safeParse(value) {
      try {
        return JSON.parse(value);
      } catch (error) {
        return null;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const transfer = safeParse(localStorage.getItem('sdrs_last_outlet_sender_transfer'));

      if (transfer) {
        document.getElementById('fromOutlet').textContent = transfer.sourceOutletName || transfer.outletName || transfer.sourceOutletId || '--';
        document.getElementById('toDestination').textContent = transfer.destinationName || transfer.destinationOutletName || transfer.destinationType || '--';
        document.getElementById('itemName').textContent = transfer.xfer || transfer.items?.[0]?.name || transfer.items?.[0]?.xferNumber || '--';
        document.getElementById('totalBoxes').textContent = transfer.totalBoxes || transfer.items?.[0]?.totalBoxes || '--';
        document.getElementById('status').textContent = transfer.status || 'OUTLET_TRANSFER_PENDING';
      }

      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>
