<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDRS - Outlet Sender</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-shadow { box-shadow: 0 4px 20px rgba(15, 35, 65, 0.08); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F2341',
            teal: '#2BA5B5',
            corporate: {
              50: '#f8fafc',
              100: '#f1f5f9'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-corporate-50 min-h-screen flex flex-col text-slate-800 pb-10">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="text-slate-400 hover:text-navy transition-colors">
          <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
        </a>
        <div class="w-8 h-8 bg-sky-500 text-white rounded-lg flex items-center justify-center shadow-sm">
          <i data-lucide="send" style="width:18px;height:18px;"></i>
        </div>
        <div>
          <h1 class="text-lg font-extrabold text-navy tracking-tight leading-none">Outlet Sender</h1>
          <p class="text-[10px] uppercase font-bold text-sky-500 tracking-widest leading-none mt-1">Outlet Transfer</p>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto p-4 flex flex-col fade-up">
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden card-shadow mb-6">
      <div class="bg-slate-50 border-b border-slate-200 p-4 flex items-center gap-2">
        <i data-lucide="route" class="text-sky-500" style="width:20px;height:20px;"></i>
        <div>
          <h2 class="font-extrabold text-navy text-lg">Create Outlet Transfer</h2>
          <p class="text-xs uppercase tracking-wide font-bold text-sky-500 mt-1">Source, destination and item details</p>
        </div>
      </div>

      <div class="p-6">
        <form id="outletSenderForm" onsubmit="submitOutletTransfer(event)" class="space-y-6">
          <section class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div class="flex items-center gap-2 mb-4">
              <i data-lucide="map-pin" class="text-sky-500" style="width:18px;height:18px;"></i>
              <h3 class="text-sm font-extrabold text-navy uppercase tracking-wide">From</h3>
            </div>
            <label class="block">
              <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">From Outlet</span>
              <select id="sourceOutlet" required onchange="updateDestinationOptions()" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                <option value="">Select source outlet</option>
              </select>
            </label>
          </section>

          <section class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div class="flex items-center gap-2 mb-4">
              <i data-lucide="navigation" class="text-sky-500" style="width:18px;height:18px;"></i>
              <h3 class="text-sm font-extrabold text-navy uppercase tracking-wide">To</h3>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <label class="block">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Destination Type</span>
                <select id="destinationType" required onchange="toggleDestinationType()" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                  <option value="Outlet">Outlet</option>
                  <option value="Warehouse">Warehouse</option>
                </select>
              </label>
              <label id="toOutletWrapper" class="block">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">To Outlet</span>
                <select id="destinationOutlet" required class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                  <option value="">Select destination outlet</option>
                </select>
              </label>
            </div>
          </section>

          <section class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <div class="flex items-center gap-2 mb-4">
              <i data-lucide="package" class="text-sky-500" style="width:18px;height:18px;"></i>
              <h3 class="text-sm font-extrabold text-navy uppercase tracking-wide">Item</h3>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
              <label class="block">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">XFER / Item Name</span>
                <input id="itemName" type="text" required class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition" placeholder="Enter XFER or item name">
              </label>
              <label class="block">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Total Boxes / Quantity</span>
                <input id="totalBoxes" type="number" min="1" required class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition" placeholder="0">
              </label>
              <label class="block sm:col-span-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Remarks</span>
                <input id="remarks" type="text" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-500 transition" placeholder="Optional remarks">
              </label>
            </div>
          </section>

          <div class="pt-2 border-t border-slate-100">
            <button type="submit" class="w-full bg-navy hover:bg-navy/90 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md flex justify-center items-center gap-2">
              <i data-lucide="send" style="width:18px;height:18px;"></i>
              Submit Transfer Request
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="../shared/state.js"></script>
  <script src="../shared/supabase-config.js"></script>
  <script src="../shared/supabase-sync.js"></script>
  <script>
    const OUTLETS = [
      { id: 'IDOUT01', name: 'Farmasi Al Qanaah Air Biru' },
      { id: 'IDOUT02', name: 'Farmasi Al Qanaah Scientex' },
      { id: 'IDOUT03', name: 'Farmasi Al Qanaah Kempas' },
      { id: 'IDOUT04', name: 'Farmasi Al Qanaah Taman Suria' },
      { id: 'IDOUT05', name: 'Farmasi Al Qanaah Sri Saujana' },
      { id: 'IDOUT06', name: 'Farmasi Al Qanaah Seri Alam' },
      { id: 'IDOUT07', name: 'Farmasi Al Qanaah Pulai Mutiara' },
      { id: 'IDOUT08', name: 'Farmasi Al Qanaah Sierra Perdana' },
      { id: 'IDOUT09', name: 'Farmasi Al Qanaah Larkin' }
    ];

    function fillOutletSelect(select, outlets, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>` + outlets.map(outlet =>
        `<option value="${outlet.id}">${outlet.id} - ${outlet.name}</option>`
      ).join('');
    }

    function getOutletById(id) {
      return OUTLETS.find(outlet => outlet.id === id) || null;
    }

    function updateDestinationOptions() {
      const sourceId = document.getElementById('sourceOutlet').value;
      const destinationSelect = document.getElementById('destinationOutlet');
      const currentDestination = destinationSelect.value;
      const available = OUTLETS.filter(outlet => outlet.id !== sourceId);
      fillOutletSelect(destinationSelect, available, 'Select destination outlet');
      if (currentDestination && currentDestination !== sourceId && available.some(outlet => outlet.id === currentDestination)) {
        destinationSelect.value = currentDestination;
      }
    }

    function toggleDestinationType() {
      const type = document.getElementById('destinationType').value;
      const wrapper = document.getElementById('toOutletWrapper');
      const destinationSelect = document.getElementById('destinationOutlet');
      const isWarehouse = type === 'Warehouse';
      wrapper.classList.toggle('hidden', isWarehouse);
      destinationSelect.required = !isWarehouse;
      if (isWarehouse) destinationSelect.value = '';
    }

    function saveToStorage(record) {
      const driverStatuses = ['PENDING_DRIVER', 'CREATED', 'READY_FOR_PICKUP', 'PENDING'];
      const shouldQueueForDriver = driverStatuses.includes(String(record.delivery_status || record.driver_status || record.status || '').toUpperCase());
      if (window.SDRSStateManager) {
        if (shouldQueueForDriver) {
          window.SDRSStateManager.appendState('driverQueue', record);
        }
        window.SDRSStateManager.appendState('adminGlobalPipeline', record);
        window.SDRSStateManager.syncAllModules();
        return;
      }

      if (shouldQueueForDriver) {
        const driverQueue = JSON.parse(localStorage.getItem('driverQueue') || '[]');
        driverQueue.push(record);
        localStorage.setItem('driverQueue', JSON.stringify(driverQueue));
        localStorage.setItem('driver_tasks', JSON.stringify(driverQueue));
      }

      const adminPipeline = JSON.parse(localStorage.getItem('adminGlobalPipeline') || '[]');
      adminPipeline.push(record);
      localStorage.setItem('adminGlobalPipeline', JSON.stringify(adminPipeline));
      localStorage.setItem('sdrs_records', JSON.stringify(adminPipeline));
    }

    async function submitOutletTransfer(event) {
      event.preventDefault();

      const sourceOutlet = getOutletById(document.getElementById('sourceOutlet').value);
      const destinationType = document.getElementById('destinationType').value;
      const savedDestinationType = destinationType.toUpperCase();
      const destinationOutlet = destinationType === 'Outlet' ? getOutletById(document.getElementById('destinationOutlet').value) : null;
      const itemName = document.getElementById('itemName').value.trim();
      const totalBoxes = parseInt(document.getElementById('totalBoxes').value, 10) || 0;
      const remarks = document.getElementById('remarks').value.trim();

      if (!sourceOutlet || !itemName || totalBoxes <= 0) return;
      if (destinationType === 'Outlet' && !destinationOutlet) return;
      if (destinationOutlet && destinationOutlet.id === sourceOutlet.id) return;

      const now = new Date();
      const createdAt = now.toLocaleString('en-MY', {
        timeZone: 'Asia/Kuala_Lumpur',
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
      const id = `OTS-${now.getTime()}`;
      const destinationName = destinationType === 'Warehouse' ? 'Warehouse Sierra Perdana' : destinationOutlet.name;
      const destinationId = destinationType === 'Warehouse' ? 'WH' : destinationOutlet.id;
      const routeLabel = destinationType === 'Outlet'
        ? `${sourceOutlet.id} -> ${destinationOutlet.id}`
        : `${sourceOutlet.id} -> WH`;
      const item = {
        xferNumber: itemName,
        name: itemName,
        totalBoxes,
        qty: totalBoxes,
        remarks
      };

      const transfer = {
        id,
        transferId: id,
        transfer_id: id,
        orderId: id,
        sourceType: 'OUTLET_SENDER',
        source_type: 'OUTLET_SENDER',
        sourceOutletId: sourceOutlet.id,
        sourceOutletName: sourceOutlet.name,
        outletId: destinationOutlet ? destinationOutlet.id : destinationId,
        outlet_id: destinationOutlet ? destinationOutlet.id : destinationId,
        outletName: destinationOutlet ? destinationOutlet.name : destinationName,
        outlet_name: destinationOutlet ? destinationOutlet.name : destinationName,
        destinationType: savedDestinationType,
        destinationId,
        destination_id: destinationId,
        destinationOutletId: destinationOutlet ? destinationOutlet.id : '',
        destinationOutletName: destinationOutlet ? destinationOutlet.name : '',
        destinationName,
        routeLabel,
        displayTransferId: routeLabel,
        xfer: itemName,
        items: [item],
        xfers: [item],
        xferItems: [item],
        totalBoxes,
        total_boxes: totalBoxes,
        remarks,
        delivery_status: 'PENDING_DRIVER',
        driver_status: 'PENDING_DRIVER',
        outlet_status: 'PENDING',
        status: 'PENDING_DRIVER',
        outletStatus: 'PENDING',
        createdAt,
        createdTimestamp: now.getTime(),
        timestamps: { createdAt: now.getTime() }
      };

      console.log("[OUTLET SENDER PAYLOAD]", transfer);

      let savedRecord = transfer;
      if (window.SDRSSupabase && typeof window.SDRSSupabase.saveDeliveryRecord === 'function' && window.SDRSSupabase.isConfigured()) {
        try {
          savedRecord = await window.SDRSSupabase.saveDeliveryRecord(transfer);
          if (!savedRecord) {
            throw new Error('Supabase returned no saved delivery record.');
          }
          console.log("[OUTLET SENDER SUPABASE INSERT]", savedRecord);
          console.log("[OUTLET SENDER SAVED]", savedRecord);
        } catch (error) {
          console.error('[OUTLET SENDER SUPABASE ERROR]', error);
          alert('Transfer was not saved. Please check the console for the Supabase error.');
          return;
        }
      } else {
        console.warn('[OUTLET SENDER SUPABASE ERROR] Supabase is not configured. Saving to local fallback only.');
      }

      saveToStorage(savedRecord);
      localStorage.setItem('sdrs_last_outlet_sender_transfer', JSON.stringify(savedRecord));
      window.location.href = 'order-done.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      fillOutletSelect(document.getElementById('sourceOutlet'), OUTLETS, 'Select source outlet');
      updateDestinationOptions();
      toggleDestinationType();
      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>
