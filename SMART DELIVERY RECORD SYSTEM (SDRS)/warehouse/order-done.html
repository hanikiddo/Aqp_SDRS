<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Generated | Warehouse</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-shadow { box-shadow: 0 18px 45px rgba(15, 35, 65, 0.12); }
    body { background: linear-gradient(180deg, #FEF3C7 0%, #F8FAFC 100%); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F2341',
            amber: '#F59E0B',
            amberSoft: '#FEF3C7',
            corporate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-800">
  <main class="w-full max-w-xl bg-white rounded-[2rem] border border-slate-200 card-shadow p-8 sm:p-10">
    <div class="flex flex-col items-center text-center gap-6">
      <div class="flex h-24 w-24 items-center justify-center rounded-full bg-emerald-100 text-emerald-700 shadow-sm">
        <i data-lucide="check-circle" class="w-14 h-14"></i>
      </div>
      <div>
        <h1 class="text-3xl font-extrabold text-navy">Order Successfully Generated!</h1>
        <p class="mt-3 text-sm text-slate-500">Your transfer order has been saved and is ready for the next step.</p>
      </div>
      <div class="w-full rounded-3xl border border-amber-100 bg-amber-50 p-6 text-left shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-amber-600 font-bold mb-2">Order Summary</p>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Transfer ID</p>
            <p id="transferId" class="text-lg font-bold text-navy">--</p>
          </div>
          <div class="rounded-2xl bg-white border border-slate-200 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-500 mb-2">Destination</p>
            <p id="outletName" class="text-lg font-bold text-navy">--</p>
          </div>
        </div>
      </div>
      <a href="index.html" class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-navy px-6 py-4 text-sm font-bold text-white shadow-lg shadow-navy/10 transition hover:bg-[#0c1c34]">
        <i data-lucide="chevrons-left" class="w-4 h-4"></i>
        Back to Select Outlet
      </a>
    </div>
  </main>

  <script>
    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
      const lastOrder = JSON.parse(localStorage.getItem('sdrs_last_order') || 'null');
      if (lastOrder) {
        document.getElementById('transferId').textContent = lastOrder.id || 'Unknown ID';
        document.getElementById('outletName').textContent = lastOrder.outletName || lastOrder.outletId || 'Unknown Destination';
      } else {
        document.getElementById('transferId').textContent = 'No recent order';
        document.getElementById('outletName').textContent = 'Please return to select outlet';
      }
    });
  </script>
</body>
</html>
