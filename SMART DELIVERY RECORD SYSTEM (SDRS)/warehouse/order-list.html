<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDRS - Order List</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .card-shadow { box-shadow: 0 4px 20px rgba(15, 35, 65, 0.08); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            navy: '#0F2341',
            teal: '#2BA5B5',
            'teal-light': '#E8F6F8',
            corporate: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              900: '#0f172a'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-corporate-50 min-h-screen flex flex-col text-slate-800 pb-10">

  <!-- Setup Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-slate-400 hover:text-navy transition-colors">
            <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
        </a>
        <div class="w-8 h-8 bg-amber-500 text-white rounded-lg flex items-center justify-center shadow-sm">
          <i data-lucide="clipboard-list" style="width:18px;height:18px;"></i>
        </div>
        <div>
          <h1 class="text-lg font-extrabold text-navy tracking-tight leading-none">Outlet Orders</h1>
          <p id="outletSubtitle" class="text-[10px] uppercase font-bold text-amber-500 tracking-widest leading-none mt-1">Loading...</p>
        </div>
      </div>
      <div>
        <a href="index.html" class="flex items-center gap-2 bg-navy text-white text-sm font-bold px-4 py-2 rounded-lg hover:bg-navy/90 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-navy focus:ring-offset-2">
          <i data-lucide="plus" style="width:16px;height:16px;"></i>
          <span class="hidden sm:inline">Create New Order</span>
          <span class="sm:hidden">New</span>
        </a>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-3xl w-full mx-auto p-4 flex flex-col fade-up mt-4">
    <div id="ordersContainer" class="space-y-4">
        <!-- Orders injected here -->
    </div>
  </main>

  <script src="../shared/state.js"></script>
  <script>
    lucide.createIcons();

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const outletId = urlParams.get('outletId');
      const outletName = urlParams.get('outletName');
      
      const subtitleElement = document.getElementById('outletSubtitle');
      const container = document.getElementById('ordersContainer');
      
      const orders = window.sdrsOrders || [];
      const filteredOrders = orders.filter(o => {
        if (outletId && o.outletId === outletId) return true;
        if (outletName && o.outletName === outletName) return true;
        if (outletName && o.outlet === outletName) return true;
        return false;
      });

      if (!outletId && !outletName) {
        subtitleElement.textContent = 'All Outlets';
      } else {
        subtitleElement.textContent = outletName || outletId || 'Outlet Orders';
      }

      if (filteredOrders.length === 0) {
        container.innerHTML = `
          <div class="bg-white p-8 rounded-2xl border border-slate-200 text-center card-shadow">
            <i data-lucide="package-x" class="mx-auto text-slate-300 mb-3" style="width:48px;height:48px;"></i>
            <h3 class="text-lg font-bold text-slate-700 mb-1">No XFERs found</h3>
            <p class="text-slate-500 text-sm">No saved transfer orders match this outlet.</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      const getStatusBadge = (status) => {
        let colors = '';
        if (status === 'CREATED' || status === 'PENDING' || status === 'PENDING_DRIVER') colors = 'bg-slate-100 text-slate-700 border-slate-200';
        else if (status === 'VERIFIED_BY_DRIVER') colors = 'bg-blue-50 text-blue-700 border-blue-200';
        else if (status === 'COMPLETED') colors = 'bg-emerald-50 text-emerald-700 border-emerald-200';
        else if (status === 'MISMATCH') colors = 'bg-red-50 text-red-700 border-red-200';
        else colors = 'bg-slate-100 text-slate-700 border-slate-200';

        return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${colors}">${status || 'UNKNOWN'}</span>`;
      };

      const formatDate = (timestamp) => {
        if (!timestamp) return 'N/A';
        if (typeof timestamp === 'string' && timestamp.includes(',')) return timestamp;
        const d = new Date(timestamp);
        return d.toLocaleDateString('en-MY', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      };

      const renderXferRows = (order) => {
        const rows = order.xfers || [];
        if (rows.length === 0 && order.items) {
          return order.items.map(item => `
            <div class="grid grid-cols-3 gap-3 py-2 border-b border-slate-100 last:border-b-0">
              <div class="font-semibold text-slate-800 col-span-2">${item.name}</div>
              <div class="text-right text-sm text-slate-600">${item.qty} box</div>
            </div>
          `).join('');
        }
        return rows.map(x => `
          <div class="grid gap-2 py-3 border-b border-slate-100 last:border-b-0 sm:grid-cols-[1fr_auto]">
            <div>
              <p class="font-semibold text-slate-800">${x.xferNumber}</p>
              <p class="text-xs text-slate-500 mt-1">${x.remarks || 'No remarks'}</p>
            </div>
            <div class="text-right">
              <div class="text-sm font-bold text-slate-700">${x.totalBoxes} box</div>
            </div>
          </div>
        `).join('');
      };

      container.innerHTML = filteredOrders.map(order => `
        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden card-shadow">
          <div class="bg-slate-50 border-b border-slate-200 p-4 flex flex-wrap gap-3 items-center justify-between">
            <div>
              <div class="text-xs uppercase tracking-wide font-bold text-slate-500">Order ID</div>
              <p class="text-lg font-extrabold text-navy">${order.id}</p>
            </div>
            <div class="space-y-1 text-right">
              ${getStatusBadge(order.status)}
              <div class="text-xs text-slate-500">${formatDate(order.created_at || order.createdAt || order.created_timestamp)}</div>
            </div>
          </div>
          <div class="p-4 space-y-4">
            <div class="grid gap-4 sm:grid-cols-2">
              <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                <div class="text-xs uppercase tracking-wide text-slate-500">Outlet</div>
                <div class="font-semibold text-slate-800">${order.outletName || order.outlet || 'Unknown'}</div>
                <div class="text-xs text-slate-500 mt-1">${order.outletId || 'N/A'}</div>
              </div>
              <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                <div class="text-xs uppercase tracking-wide text-slate-500">Total Transfers</div>
                <div class="font-semibold text-slate-800">${(order.xfers || order.items || []).length}</div>
              </div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
              <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">XFER details</div>
              ${renderXferRows(order)}
            </div>
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    });
  </script>
</body>
</html>
